
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 收據助手 - 雲端備份版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-pop { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-24">
        
        <!-- Header -->
        <header class="bg-indigo-700 text-white p-6 rounded-b-[2rem] shadow-xl sticky top-0 z-30">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black">☁️ 雲端收據助手</h1>
                <button onclick="toggleSettings()" class="p-2 bg-white/10 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </button>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-md">
                <p class="text-xs font-bold opacity-70 mb-1">本月雲端待同步</p>
                <div class="flex justify-between items-end">
                    <div class="flex items-baseline">
                        <span class="text-3xl font-mono font-bold" id="header-total">0.00</span>
                        <span class="ml-1 text-sm opacity-80">HKD</span>
                    </div>
                    <div class="text-[10px] bg-green-500 text-white px-2 py-1 rounded font-bold" id="cloud-status">本地存儲模式</div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex bg-white border-b sticky top-[152px] z-20">
            <button onclick="switchTab('list')" id="tab-list" class="flex-1 py-4 text-sm font-bold tab-active">收據清單</button>
            <button onclick="switchTab('cloud')" id="tab-cloud" class="flex-1 py-4 text-sm font-bold text-gray-400">雲端同步</button>
        </div>

        <main id="content-area" class="p-4 flex-grow">
            <!-- 動態內容 -->
        </main>

        <!-- Floating Action Button -->
        <footer class="fixed bottom-0 left-0 right-0 p-6 pointer-events-none z-40">
            <div class="max-w-md mx-auto flex justify-center">
                <label class="pointer-events-auto bg-indigo-600 text-white p-5 rounded-full shadow-2xl active:scale-90 transition-transform cursor-pointer">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                    <input type="file" id="camera-input" accept="image/*" multiple class="hidden" onchange="processUpload(event)">
                </label>
            </div>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full rounded-3xl p-6 animate-pop">
            <h3 class="text-lg font-black mb-4">Google Sheets 連結設定</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Google Script URL</label>
                    <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/..." class="w-full bg-gray-100 p-3 rounded-xl text-sm mt-1 outline-none">
                </div>
                <p class="text-[10px] text-gray-400 leading-relaxed">
                    * 教學：在 Google Sheet 建立腳本並發佈為 Web App，將 URL 貼至此處即可實現一鍵同步。
                </p>
                <div class="flex gap-2 pt-2">
                    <button onclick="toggleSettings()" class="flex-1 py-3 font-bold text-gray-500">取消</button>
                    <button onclick="saveSettings()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">儲存設定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Loading -->
    <div id="loader" class="fixed inset-0 bg-white/90 z-[100] hidden flex flex-col items-center justify-center p-8">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-gray-600">AI 正在辨識並準備上傳...</p>
    </div>

    <script>
        const apiKey = ""; // Gemini API Key
        let expenses = JSON.parse(localStorage.getItem('cloud_expenses') || '[]');
        let cloudConfig = JSON.parse(localStorage.getItem('cloud_config') || '{"url":""}');
        let currentTab = 'list';

        window.onload = () => {
            renderView();
            updateHeader();
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-list').className = `flex-1 py-4 text-sm font-bold ${tab === 'list' ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-cloud').className = `flex-1 py-4 text-sm font-bold ${tab === 'cloud' ? 'tab-active' : 'text-gray-400'}`;
            renderView();
        }

        function updateHeader() {
            const total = expenses.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
            document.getElementById('header-total').innerText = total.toFixed(2);
            document.getElementById('cloud-status').innerText = cloudConfig.url ? "已連結 Google Sheets" : "本地存儲模式";
        }

        function renderView() {
            const container = document.getElementById('content-area');
            if (currentTab === 'list') {
                if (expenses.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 opacity-30 font-bold">尚無收據數據</div>`;
                    return;
                }
                container.innerHTML = expenses.map((item, idx) => `
                    <div class="bg-white p-4 rounded-2xl mb-3 shadow-sm border border-gray-100 flex items-center gap-4">
                        <img src="${item.image}" class="w-12 h-12 rounded-lg object-cover bg-gray-100">
                        <div class="flex-grow">
                            <div class="font-bold text-sm">${item.merchant}</div>
                            <div class="text-[10px] text-gray-400">${item.date} · ${item.category}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-mono font-bold text-indigo-600">$${parseFloat(item.amount).toFixed(2)}</div>
                            <button onclick="deleteItem(${idx})" class="text-[10px] text-red-400 font-bold uppercase mt-1">刪除</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-indigo-50 p-6 rounded-3xl border border-indigo-100">
                            <h3 class="font-black text-indigo-900 mb-2">Google Drive 備份</h3>
                            <p class="text-xs text-indigo-700/70 mb-4">將本月所有收據導出為 Excel 並手動儲存至雲端硬碟。</p>
                            <button onclick="exportExcel()" class="w-full bg-white text-indigo-600 py-3 rounded-xl font-bold shadow-sm flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm0 2h12v10H4V5z"/></svg>
                                導出 Excel 至 Drive
                            </button>
                        </div>

                        <div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                            <h3 class="font-black text-emerald-900 mb-2">自動同步 (Google Sheets)</h3>
                            <p class="text-xs text-emerald-700/70 mb-4">若已設定 Script URL，可直接將數據推送到你的雲端表格。</p>
                            <button onclick="syncToCloud()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                                立即同步數據
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        async function processUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            document.getElementById('loader').classList.remove('hidden');

            for (let file of files) {
                const base64 = await toBase64(file);
                const aiResult = await callAI(base64.split(',')[1]);
                expenses.unshift({
                    merchant: aiResult.merchant || "未知商戶",
                    amount: aiResult.amount || 0,
                    category: aiResult.category || "其他",
                    date: aiResult.date || new Date().toISOString().split('T')[0],
                    image: base64
                });
            }

            localStorage.setItem('cloud_expenses', JSON.stringify(expenses));
            document.getElementById('loader').classList.add('hidden');
            renderView();
            updateHeader();
        }

        async function callAI(base64) {
            const prompt = "提取 JSON: {amount: number, merchant: string, category: string, date: YYYY-MM-DD}";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await res.json();
                return JSON.parse(d.candidates[0].content.parts[0].text);
            } catch (e) { return {}; }
        }

        function toBase64(file) {
            return new Promise((res) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function deleteItem(idx) {
            if (confirm('確定刪除？')) {
                expenses.splice(idx, 1);
                localStorage.setItem('cloud_expenses', JSON.stringify(expenses));
                renderView();
                updateHeader();
            }
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(expenses.map(e => ({
                日期: e.date, 商戶: e.merchant, 類別: e.category, 金額: e.amount
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "收據報表");
            XLSX.writeFile(wb, `收據月結_${new Date().toISOString().slice(0,7)}.xlsx`);
        }

        async function syncToCloud() {
            if (!cloudConfig.url) {
                alert("請先點擊右上角設定 Google Script URL");
                return;
            }
            alert("正在傳送數據至 Google Sheets...");
            // 實際執行時會使用 fetch(cloudConfig.url, {method:'POST', body: JSON.stringify(expenses)})
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
            document.getElementById('script-url').value = cloudConfig.url;
        }

        function saveSettings() {
            cloudConfig.url = document.getElementById('script-url').value;
            localStorage.setItem('cloud_config', JSON.stringify(cloudConfig));
            toggleSettings();
            updateHeader();
        }
    </script>
</body>
</html>
