<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 財務助手 - 高精準 OCR 版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .receipt-card { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading-ring { border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { color: #4f46e5; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-28">
        <header class="bg-indigo-600 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-30">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-black flex items-center gap-2"><span class="text-2xl">🧾</span> 高精準 OCR 助手</h1>
                    <p id="display-month" class="text-indigo-200 text-xs font-bold mt-1">載入中...</p>
                </div>
            </div>
            <div class="bg-white/10 p-5 rounded-2xl backdrop-blur-md border border-white/20">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">本月核銷總金額</p>
                <div class="flex justify-between items-end">
                    <div class="flex items-baseline gap-1">
                        <span class="text-sm font-bold text-indigo-200">$</span>
                        <span id="monthly-total" class="text-4xl font-mono font-black tracking-tighter">0.00</span>
                    </div>
                    <div id="item-count" class="text-[10px] bg-white/20 px-3 py-1 rounded-full font-bold">0 筆項目</div>
                </div>
            </div>
        </header>

        <nav class="flex bg-white/80 backdrop-blur-md border-b sticky top-[164px] z-20">
            <button onclick="switchTab('list')" id="btn-list" class="flex-1 py-4 text-sm font-bold tab-active transition-colors">收據明細</button>
            <button onclick="switchTab('report')" id="btn-report" class="flex-1 py-4 text-sm font-bold text-slate-400 transition-colors">導出報表</button>
        </nav>

        <main id="main-content" class="p-4 space-y-4 flex-grow"></main>

        <footer class="fixed bottom-0 left-0 right-0 p-6 safe-area-bottom z-40 pointer-events-none">
            <div class="max-w-md mx-auto flex justify-center">
                <label class="pointer-events-auto bg-indigo-600 text-white p-5 rounded-full shadow-2xl shadow-indigo-300 cursor-pointer active:scale-90 transition-all">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
                    <input type="file" id="image-upload" accept="image/*" multiple class="hidden" onchange="handleBatchUpload(event)">
                </label>
            </div>
        </footer>
    </div>

    <div id="global-loader" class="fixed inset-0 bg-white/95 z-[100] hidden flex flex-col items-center justify-center p-8 text-center">
        <div class="loading-ring mb-6 scale-150"></div>
        <h2 class="text-xl font-black text-slate-800 mb-2">AI 精準掃描中...</h2>
        <p id="loader-text" class="text-slate-500 text-sm">正在執行高解析度 OCR 辨識</p>
        <div class="w-48 bg-slate-100 h-1.5 rounded-full mt-6 overflow-hidden">
            <div id="loader-progress" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div id="batch-modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-3xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center bg-white rounded-t-[2.5rem] sm:rounded-3xl">
                <div>
                    <h3 class="font-bold text-lg text-slate-800">OCR 辨識結果</h3>
                    <p class="text-[10px] text-slate-400">請核對 AI 提取的資訊</p>
                </div>
                <button onclick="closeModal()" class="text-slate-300 text-3xl hover:text-slate-500">&times;</button>
            </div>
            <div id="batch-list" class="p-4 overflow-y-auto space-y-4 bg-slate-50/50"></div>
            <div class="p-6 bg-white border-t">
                <button onclick="saveBatchToLocal()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
                    存入本月明細
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-full text-xs font-bold shadow-2xl opacity-0 transition-all pointer-events-none text-white"></div>

    <script>
        // ⚠️【重要】：請在此填寫你的 Google Gemini API Key
        const apiKey = ""; 
        const DB_KEY = "ai_company_receipts_v3_hq";
        let receipts = [];
        let batchItems = [];
        let activeTab = 'list';

        window.onload = () => {
            const saved = localStorage.getItem(DB_KEY);
            receipts = saved ? JSON.parse(saved) : [];
            updateHeader();
            renderContent();
            
            const d = new Date();
            document.getElementById('display-month').innerText = `${d.getFullYear()} 年 ${d.getMonth() + 1} 月份`;
        };

        async function handleBatchUpload(event) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            // 檢查 API Key
            if (!apiKey || apiKey.trim() === "") {
                showToast("⚠️ 請先在程式碼中填入 API Key", "error");
                return;
            }

            showLoader(true);
            batchItems = [];
            
            for (let i = 0; i < files.length; i++) {
                updateLoaderStatus(`正在處理第 ${i+1}/${files.length} 張圖片...`, ((i+1)/files.length)*100);
                
                try {
                    const compressed = await compressImage(files[i]);
                    const aiData = await analyzeWithAI(compressed.base64.split(',')[1]);
                    
                    batchItems.push({
                        id: 'R' + Date.now() + i,
                        image: compressed.base64,
                        amount: aiData.amount || 0,
                        merchant: aiData.merchant || "未知商戶",
                        category: aiData.category || "其他",
                        date: aiData.date || new Date().toISOString().split('T')[0]
                    });
                } catch (err) {
                    console.error("處理圖片出錯:", err);
                    showToast("部分圖片辨識失敗，請檢查網絡", "error");
                }
            }

            showLoader(false);
            if (batchItems.length) {
                renderBatchModal();
                document.getElementById('batch-modal').classList.remove('hidden');
            }
            document.getElementById('image-upload').value = "";
        }

        // 🔧 修復 1：提高影像解析度與品質，確保文字清晰
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = async () => {
                        if ('decode' in img) await img.decode();
                        
                        const canvas = document.createElement('canvas');
                        // 提升解析度上限至 1500px，保留收據上的微小文字細節
                        const MAX_WIDTH = 1500; 
                        let width = img.width;
                        let height = img.height;

                        if (width > height && width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width; width = MAX_WIDTH;
                        } else if (height > MAX_WIDTH) {
                            width *= MAX_WIDTH / height; height = MAX_WIDTH;
                        }

                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // JPEG 質量提升至 0.8
                        resolve({ base64: canvas.toDataURL('image/jpeg', 0.8) });
                    };
                    img.onerror = reject;
                };
            });
        }

        // 🔧 修復 2 & 3：使用穩定模型，並加入 JSON Markdown 剝離器
        async function analyzeWithAI(base64Data) {
            // 強調純 JSON 輸出
            const prompt = `你是專業的財務收據辨識助手。請讀取這張圖片，提取以下資訊並「必須」以純 JSON 格式回傳（絕對不要加上 \`\`\`json 標籤）：
            { "amount": 數字, "merchant": "商戶名稱", "category": "餐飲/交通/辦公/其他", "date": "YYYY-MM-DD" }
            如果看不清金額，請填寫 0。`;
            
            try {
                // 使用穩定的 gemini-1.5-flash 模型
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }]
                        // 移除 responseMimeType，因為有時反而會讓 API 回報錯誤，改用語意控制
                    })
                });
                
                const jsonResponse = await response.json();
                
                if (!jsonResponse.candidates) {
                    console.error("AI 拒絕回應或 API Key 錯誤:", jsonResponse);
                    throw new Error("API 驗證失敗");
                }

                let rawText = jsonResponse.candidates[0].content.parts[0].text;
                
                // 🛡️ 核心修復：強制剝離 AI 自行加入的 Markdown 標籤
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                return JSON.parse(rawText);

            } catch (err) {
                console.error("解析 JSON 失敗:", err);
                return { amount: 0, merchant: "⚠️ 解析失敗", category: "其他", date: "" };
            }
        }

        // --- UI 渲染區 ---
        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('btn-list').className = `flex-1 py-4 text-sm font-bold transition-colors ${tab === 'list' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('btn-report').className = `flex-1 py-4 text-sm font-bold transition-colors ${tab === 'report' ? 'tab-active' : 'text-slate-400'}`;
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            
            if (activeTab === 'list') {
                if (!receipts.length) {
                    container.innerHTML = `<div class="py-20 text-center text-slate-300"><div class="text-6xl mb-4 opacity-20">📸</div><p class="font-bold">尚未上傳任何收據</p></div>`;
                    return;
                }
                container.innerHTML = receipts.map((item) => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 receipt-card">
                        <div class="w-16 h-16 bg-slate-100 rounded-xl overflow-hidden flex-shrink-0 border">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center gap-2">
                                <h4 class="font-bold text-slate-800 truncate">${item.merchant}</h4>
                                <span class="text-[9px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-bold uppercase">${item.category}</span>
                            </div>
                            <p class="text-[10px] text-slate-400 mt-1">${item.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono font-bold ${item.amount === 0 ? 'text-red-500' : 'text-indigo-600'}">$${parseFloat(item.amount).toFixed(2)}</p>
                            <button onclick="deleteReceipt('${item.id}')" class="text-slate-300 hover:text-red-400 mt-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                        </div>
                    </div>
                `).join('');
            } else {
                renderReportTab(container);
            }
        }

        function renderReportTab(container) {
            if (!receipts.length) {
                container.innerHTML = `<div class="py-20 text-center text-slate-300"><p class="font-bold">沒有數據可以生成報表</p></div>`;
                return;
            }
            container.innerHTML = `
                <button onclick="exportToExcel()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-emerald-100 flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    導出本月 Excel 報表
                </button>
            `;
        }

        function renderBatchModal() {
            const list = document.getElementById('batch-list');
            list.innerHTML = batchItems.map((item, idx) => `
                <div class="bg-white p-4 rounded-2xl border ${item.amount === 0 ? 'border-red-300 bg-red-50' : 'border-slate-200'} flex gap-4 relative">
                    <button onclick="removeItemFromBatch(${idx})" class="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 rounded-full flex items-center justify-center shadow-lg active:scale-90">&times;</button>
                    <div class="w-20 h-28 bg-slate-100 border rounded-lg overflow-hidden flex-shrink-0">
                        <img src="${item.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow space-y-3">
                        <div>
                            <label class="text-[10px] font-bold ${item.amount === 0 ? 'text-red-500' : 'text-slate-400'} uppercase">金額 ($) ${item.amount === 0 ? ' - 請手動輸入' : ''}</label>
                            <input type="number" value="${item.amount}" onchange="updateBatchData(${idx}, 'amount', this.value)" class="w-full bg-transparent border-b border-indigo-200 font-mono font-bold text-lg outline-none focus:border-indigo-600">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">商戶</label>
                            <input type="text" value="${item.merchant}" onchange="updateBatchData(${idx}, 'merchant', this.value)" class="w-full bg-transparent border-b border-slate-200 text-xs py-1 outline-none">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateBatchData(idx, field, val) { batchItems[idx][field] = field === 'amount' ? parseFloat(val) : val; }
        
        function removeItemFromBatch(idx) {
            batchItems.splice(idx, 1);
            if (!batchItems.length) closeModal(); else renderBatchModal();
        }

        function saveBatchToLocal() {
            receipts = [...batchItems, ...receipts];
            localStorage.setItem(DB_KEY, JSON.stringify(receipts));
            closeModal(); updateHeader(); renderContent();
            showToast("✅ 已成功存入明細");
        }

        function deleteReceipt(id) {
            if (confirm("確定要刪除這筆收據紀錄嗎？")) {
                receipts = receipts.filter(r => r.id !== id);
                localStorage.setItem(DB_KEY, JSON.stringify(receipts));
                updateHeader(); renderContent();
            }
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(receipts.map(r => ({ "日期": r.date, "商戶": r.merchant, "分類": r.category, "金額": parseFloat(r.amount) })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "收據明細");
            XLSX.writeFile(wb, `收據報表.xlsx`);
            showToast("📊 Excel 已生成");
        }

        function updateHeader() {
            const total = receipts.reduce((s, c) => s + parseFloat(c.amount), 0);
            document.getElementById('monthly-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('item-count').innerText = `${receipts.length} 筆項目`;
        }

        function showLoader(show) { document.getElementById('global-loader').classList.toggle('hidden', !show); }
        function updateLoaderStatus(text, progress) {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader-progress').style.width = progress + '%';
        }
        function closeModal() { document.getElementById('batch-modal').classList.add('hidden'); batchItems = []; }
        
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-8 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-full text-xs font-bold shadow-2xl transition-all ${type === 'success' ? 'bg-slate-900' : 'bg-red-500'} text-white opacity-100`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        }
    </script>
</body>
</html>
